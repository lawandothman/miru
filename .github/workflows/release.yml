name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  build:
    name: Build iOS
    runs-on: ubuntu-latest
    outputs:
      build-id: ${{ steps.eas-build.outputs.build-id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd apps/mobile
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.tmp.json
          mv app.tmp.json app.json

      - name: Build on EAS
        id: eas-build
        run: |
          cd apps/mobile
          BUILD_JSON=$(eas build --profile production --platform ios --non-interactive --wait --json)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          echo "build-id=$BUILD_ID" >> "$GITHUB_OUTPUT"

  submit:
    name: Submit to TestFlight
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store Connect
        run: cd apps/mobile && eas submit --profile production --platform ios --id ${{ needs.build.outputs.build-id }} --non-interactive

  ota-update:
    name: Publish OTA Update
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Patch version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd apps/mobile
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.tmp.json
          mv app.tmp.json app.json

      - name: Publish update
        run: cd apps/mobile && eas update --channel production --environment production --message "Release ${{ github.ref_name }}" --non-interactive

  sync-version:
    name: Sync version to main
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main

      - name: Update app.json version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd apps/mobile
          jq --arg v "$VERSION" '.expo.version = $v' app.json > app.tmp.json
          mv app.tmp.json app.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/mobile/app.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(mobile): sync version to ${GITHUB_REF_NAME#v}"
          git pull --rebase origin main
          git push origin main

  github-release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges > changelog.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges > changelog.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file changelog.md
