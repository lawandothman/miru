name: Release

on:
  push:
    tags:
      - "v*.*.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  EAS_CLI_VERSION: 18.3.0
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      app-version: ${{ steps.validate.outputs.app-version }}
    steps:
      - name: Validate semver tag
        id: validate
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          if [ "$TAG" = "$VERSION" ]; then
            echo "Release tags must start with v (example: v1.3.1)" >&2
            exit 1
          fi

          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tag must be semver like v1.3.1" >&2
            exit 1
          fi

          echo "app-version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    name: Build iOS
    needs: validate-release
    runs-on: ubuntu-latest
    outputs:
      build-id: ${{ steps.eas-build.outputs.build-id }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build on EAS
        id: eas-build
        env:
          APP_VERSION: ${{ needs.validate-release.outputs.app-version }}
        run: |
          cd apps/mobile
          BUILD_JSON=$(eas build --profile production --platform ios --non-interactive --wait --json)
          BUILD_ID=$(echo "$BUILD_JSON" | jq -r '.[0].id')
          echo "build-id=$BUILD_ID" >> "$GITHUB_OUTPUT"

  submit:
    name: Submit to TestFlight
    needs:
      - validate-release
      - build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Store Connect
        env:
          APP_VERSION: ${{ needs.validate-release.outputs.app-version }}
        run: cd apps/mobile && eas submit --profile production --platform ios --id ${{ needs.build.outputs.build-id }} --non-interactive

  ota-update:
    name: Publish OTA Update
    needs:
      - validate-release
      - build
      - submit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        env:
          APP_VERSION: ${{ needs.validate-release.outputs.app-version }}
          EXPO_PUBLIC_API_URL: https://watchmiru.app
          EXPO_PUBLIC_SENTRY_DSN: https://332840843ec50e8927f572108a2d42af@o4504404409581568.ingest.us.sentry.io/4511005806034944
        run: cd apps/mobile && eas update --channel production --environment production --message "Release ${{ github.ref_name }}" --non-interactive

      - name: Upload sourcemaps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: cd apps/mobile && npx sentry-expo-upload-sourcemaps dist

  github-release:
    name: GitHub Release
    needs:
      - build
      - submit
      - ota-update
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            git log "$PREV_TAG"..HEAD --pretty=format:"- %s (%h)" --no-merges > changelog.md
          else
            git log --pretty=format:"- %s (%h)" --no-merges > changelog.md
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$GITHUB_REF_NAME" --yes 2>/dev/null || true
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file changelog.md
