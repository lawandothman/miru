name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: Update message
        required: false
        default: ""

concurrency:
  group: ota-update
  cancel-in-progress: false

env:
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Patch version from latest release tag
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | head -n 1)
          VERSION="${TAG#v}"
          echo "Resolved version: $VERSION (from tag $TAG)"
          cd apps/mobile
          node -e 'const fs = require("node:fs"); const file = "app.config.ts"; const version = process.argv[1]; const source = fs.readFileSync(file, "utf8"); const updated = source.replace(/version:\s*"[^"]+"/, `version: "${version}"`); if (source === updated) throw new Error("Failed to update Expo version in app.config.ts"); fs.writeFileSync(file, updated);' "$VERSION"

      - name: Publish update
        run: |
          MESSAGE="${{ github.event.inputs.message }}"
          cd apps/mobile
          if [ -n "$MESSAGE" ]; then
            eas update --channel production --environment production --message "$MESSAGE" --non-interactive
          else
            eas update --channel production --environment production --non-interactive
          fi
