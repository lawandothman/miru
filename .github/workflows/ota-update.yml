name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: Update message
        required: false
        default: ""

concurrency:
  group: ota-update
  cancel-in-progress: false

env:
  EAS_CLI_VERSION: 18.3.0
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        env:
          EXPO_PUBLIC_API_URL: https://watchmiru.app
          EXPO_PUBLIC_SENTRY_DSN: https://332840843ec50e8927f572108a2d42af@o4504404409581568.ingest.us.sentry.io/4511005806034944
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '1p')
          APP_VERSION="${TAG#v}"

          if [ -z "$TAG" ] || ! printf '%s' "$APP_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Latest release tag must be semver like v1.3.1" >&2
            exit 1
          fi

          echo "Resolved version: $APP_VERSION (from tag $TAG)"
          MESSAGE="${{ github.event.inputs.message }}"
          cd apps/mobile
          if [ -n "$MESSAGE" ]; then
            APP_VERSION="$APP_VERSION" eas update --channel production --environment production --message "$MESSAGE" --non-interactive
          else
            APP_VERSION="$APP_VERSION" eas update --channel production --environment production --non-interactive
          fi

      - name: Upload sourcemaps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: cd apps/mobile && npx sentry-expo-upload-sourcemaps dist
