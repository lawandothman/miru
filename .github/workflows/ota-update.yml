name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: Update message
        required: false
        default: ""

concurrency:
  group: ota-update
  cancel-in-progress: false

env:
  EAS_CLI_VERSION: 18.3.0
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

jobs:
  update:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24.14.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@c7b66a9c327a43a8fa7c0158e7f30d6040d2481e # v8
        with:
          eas-version: ${{ env.EAS_CLI_VERSION }}
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish update
        run: |
          TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '1p')
          APP_VERSION="${TAG#v}"

          if [ -z "$TAG" ] || ! printf '%s' "$APP_VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Latest release tag must be semver like v1.3.1" >&2
            exit 1
          fi

          echo "Resolved version: $APP_VERSION (from tag $TAG)"
          MESSAGE="${{ github.event.inputs.message }}"
          cd apps/mobile
          if [ -n "$MESSAGE" ]; then
            APP_VERSION="$APP_VERSION" eas update --channel production --environment production --message "$MESSAGE" --non-interactive
          else
            APP_VERSION="$APP_VERSION" eas update --channel production --environment production --non-interactive
          fi
